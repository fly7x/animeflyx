<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>animeflyx</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* =======================
   PREMIUM NETFLIX THEME
======================= */
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0a0a0a;
    color: white;
}

/* TOP BAR */
header {
    display: flex;
    justify-content: space-between;
    padding: 15px 25px;
    align-items: center;
    background: rgba(0,0,0,0.8);
    position: sticky;
    top: 0;
    z-index: 10;
    border-bottom: 1px solid #222;
}

.logo {
    color: #e50914;
    font-weight: bold;
    font-size: 20px;
}

input {
    padding: 8px 10px;
    border-radius: 6px;
    border: none;
    background: #1a1a1a;
    color: white;
    outline: none;
}

/* HERO */
.hero {
    height: 380px;
    background-size: cover;
    background-position: center;
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 30px;
}

.hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, #0a0a0a, transparent);
}

.hero-content {
    position: relative;
    z-index: 2;
}

.hero-title {
    font-size: 32px;
    font-weight: bold;
}

.hero-btn {
    margin-top: 10px;
    padding: 10px 15px;
    background: #e50914;
    border: none;
    color: white;
    cursor: pointer;
    border-radius: 6px;
}

/* ROWS */
.row {
    padding: 20px;
}

.row h2 {
    color: #e50914;
}

.row-container {
    display: flex;
    overflow-x: auto;
    gap: 12px;
}

.card {
    min-width: 140px;
    background: #111;
    border-radius: 10px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.3s;
}

.card:hover {
    transform: scale(1.08);
    box-shadow: 0 0 15px #e50914;
}

.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* PLAYER */
.player {
    padding: 20px;
}

iframe {
    width: 100%;
    height: 420px;
    border: none;
    border-radius: 10px;
}

/* CONTROLS */
.controls {
    display: flex;
    gap: 10px;
    margin-top: 10px;
}

button, select {
    padding: 8px;
    border-radius: 6px;
    border: none;
    background: #1a1a1a;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #e50914;
}

/* DETAILS MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    padding: 20px;
}

.modal-content {
    max-width: 600px;
    background: #111;
    padding: 20px;
    border-radius: 12px;
}

/* BOTTOM ANIME STRIP */
.strip {
    display: flex;
    overflow-x: auto;
    padding: 20px;
    gap: 10px;
}

.strip img {
    height: 120px;
    border-radius: 8px;
    opacity: 0.8;
    transition: 0.3s;
}

.strip img:hover {
    opacity: 1;
    transform: scale(1.1);
}

/* LOGIN */
.login {
    position: fixed;
    inset: 0;
    background: black;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: #111;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
}

.login-box input {
    width: 100%;
    margin: 5px 0;
}

/* SCROLLBAR */
.row-container::-webkit-scrollbar,
.strip::-webkit-scrollbar {
    display: none;
}
</style>
</head>

<body>

<!-- ================= LOGIN ================= -->
<div class="login" id="login">
    <div class="login-box">
        <h2 style="color:#e50914;">Login</h2>
        <input id="user" placeholder="Username">
        <input id="pass" type="password" placeholder="Password">
        <button onclick="login()">Enter</button>
    </div>
</div>

<!-- ================= MAIN ================= -->
<header>
    <div class="logo">animeflyx</div>
    <input id="search" placeholder="Search anime...">
</header>

<!-- HERO -->
<div class="hero" id="hero">
    <div class="hero-content">
        <div class="hero-title" id="heroTitle"></div>
        <button class="hero-btn" onclick="openModal()">View Details</button>
    </div>
</div>

<!-- CONTINUE -->
<div class="row">
    <h2>Continue Watching</h2>
    <div id="continue" class="row-container"></div>
</div>

<!-- TRENDING -->
<div class="row">
    <h2>Trending</h2>
    <div id="trending" class="row-container"></div>
</div>

<!-- PLAYER -->
<div class="player" id="playerBox" style="display:none;">
    <iframe id="player"></iframe>

    <div class="controls">
        <select id="eps"></select>
        <button onclick="setType('sub')">Sub</button>
        <button onclick="setType('dub')">Dub</button>
    </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h2 id="mTitle"></h2>
        <p id="mDesc"></p>
        <button onclick="closeModal()">Close</button>
    </div>
</div>

<!-- JJk STYLE STRIP -->
<div class="strip">
    <img src="https://cdn.myanimelist.net/images/anime/1171/109222.jpg">
    <img src="https://cdn.myanimelist.net/images/anime/1299/110774.jpg">
    <img src="https://cdn.myanimelist.net/images/anime/1171/111553.jpg">
    <img src="https://cdn.myanimelist.net/images/anime/1244/122144.jpg">
</div>

<script>

/* ================= LOGIN (frontend only for now) ================= */
function login() {
    const u = document.getElementById("user").value;
    if (!u) return;

    localStorage.setItem("user", u);
    document.getElementById("login").style.display = "none";
}

if (localStorage.getItem("user")) {
    document.getElementById("login").style.display = "none";
}

/* ================= GLOBAL ================= */
let current;
let ep = 1;
let type = "sub";

/* ================= TRENDING ================= */
window.onload = async () => {
    const res = await fetch("https://api.jikan.moe/v4/top/anime?limit=10");
    const data = await res.json();

    render(data.data, "trending");
    setHero(data.data[0]);
};

function setHero(a) {
    document.getElementById("hero").style.backgroundImage =
        `url(${a.images.jpg.large_image_url})`;

    document.getElementById("heroTitle").innerText = a.title;

    current = a;
    document.getElementById("mTitle").innerText = a.title;
    document.getElementById("mDesc").innerText = a.synopsis || "No description";
}

/* ================= RENDER ================= */
function render(list, id) {
    const row = document.getElementById(id);
    row.innerHTML = "";

    list.forEach(a => {
        const d = document.createElement("div");
        d.className = "card";
        d.innerHTML = `<img src="${a.images.jpg.large_image_url}">`;
        d.onclick = () => loadAnime(a);
        row.appendChild(d);
    });
}

/* ================= ANIME LOAD ================= */
function loadAnime(a) {
    current = a;
    ep = 1;

    const select = document.getElementById("eps");
    select.innerHTML = "";

    let total = a.episodes || 12;

    for (let i = 1; i <= total; i++) {
        let o = document.createElement("option");
        o.value = i;
        o.innerText = "EP " + i;
        select.appendChild(o);
    }

    select.onchange = (e) => {
        ep = e.target.value;
        play();
    };

    play();
    document.getElementById("playerBox").style.display = "block";
}

/* ================= PLAYER ================= */
function play() {
    document.getElementById("player").src =
        `https://vidlink.pro/anime/${current.mal_id}/${ep}/${type}?fallback=true`;
}

/* ================= TYPE ================= */
function setType(t) {
    type = t;
    play();
}

/* ================= MODAL ================= */
function openModal() {
    document.getElementById("modal").style.display = "flex";
}

function closeModal() {
    document.getElementById("modal").style.display = "none";
}

</script>

</body>
</html>
