<script>
'use strict';

/* ───────── BASIC UTILS ───────── */
const $ = id => document.getElementById(id);
const esc = s => (s ?? '').replace(/[&<>"]/g, m =>
  ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m])
);

/* ───────── STATE ───────── */
const STATE = {
  view: 'landing', // landing | browse | watch
  anime: null,
  ep: 1,
  type: 'sub'
};

/* ───────── JIKAN API ───────── */
async function jikanSearch(q) {
  const r = await fetch(`https://api.jikan.moe/v4/anime?q=${encodeURIComponent(q)}&limit=20&sfw=true`);
  const j = await r.json();

  return (j.data || []).map(a => ({
    id: a.mal_id,
    malId: a.mal_id,
    title: a.title,
    eps: a.episodes || 12,
    syn: a.synopsis || '',
    score: a.score,
    img: a.images?.jpg?.large_image_url,
    genres: (a.genres || []).map(g => g.name)
  }));
}

/* ───────── HOT SEARCHES ───────── */
const HOT = ["One Piece","Jujutsu Kaisen","Attack on Titan","Demon Slayer"];

function renderHot() {
  const wrap = $('hot-searches');
  wrap.innerHTML = HOT.map(q =>
    `<span class="hot" onclick="doSearch('${q}')">${q}</span>`
  ).join('');
}

/* ───────── CONTINUE WATCHING ───────── */
const CW_KEY = 'cw_v1';
let CW = [];

function cwLoad() {
  try { CW = JSON.parse(localStorage.getItem(CW_KEY)) || []; }
  catch { CW = []; }
}

function cwSave() {
  localStorage.setItem(CW_KEY, JSON.stringify(CW));
}

function cwPush(anime, ep) {
  CW = CW.filter(x => x.id !== anime.id);
  CW.unshift({ ...anime, ep });
  if (CW.length > 12) CW.pop();
  cwSave();
  renderCW();
}

function renderCW() {
  const row = $('cw-row');
  if (!row) return;

  if (!CW.length) {
    row.innerHTML = `<p class="dim">Start watching — it appears here.</p>`;
    return;
  }

  row.innerHTML = CW.map(a => `
    <div class="card" onclick="openPlayer(${a.id})">
      <img src="${a.img}">
      <div>${esc(a.title)}</div>
      <small>Ep ${a.ep}</small>
    </div>
  `).join('');
}

/* ───────── SEARCH ───────── */
async function doSearch(q) {
  if (!q) return;

  $('search-grid').innerHTML = 'Loading...';
  showView('browse');

  const res = await jikanSearch(q);

  $('search-grid').innerHTML = res.map(a => `
    <div class="card" onclick='openPlayerObj(${JSON.stringify(a)})'>
      <img src="${a.img}">
      <div>${esc(a.title)}</div>
    </div>
  `).join('');
}

/* ───────── PLAYER ───────── */
function playerUrl(id, ep) {
  return `https://vidlink.pro/anime/${id}/${ep}/sub`;
}

function openPlayerObj(anime) {
  STATE.anime = anime;
  STATE.ep = 1;

  $('watch-title').textContent = anime.title;
  $('player').src = playerUrl(anime.id, 1);

  buildEpisodes(anime.eps);

  showView('watch');
  cwPush(anime, 1);
}

function buildEpisodes(n) {
  const list = $('ep-list');
  list.innerHTML = '';

  for (let i=1;i<=n;i++) {
    const el = document.createElement('div');
    el.className = 'ep';
    el.textContent = i;

    el.onclick = () => {
      STATE.ep = i;
      $('player').src = playerUrl(STATE.anime.id, i);
      cwPush(STATE.anime, i);
    };

    list.appendChild(el);
  }
}

/* ───────── VIEW SYSTEM ───────── */
function showView(v) {
  STATE.view = v;

  ['landing','browse','watch'].forEach(id => {
    $(`view-${id}`).style.display = (id === v ? 'block' : 'none');
  });
}

/* ───────── SCROLL BEHAVIOR ───────── */
window.addEventListener('scroll', () => {
  if (STATE.view !== 'landing') return;

  const y = window.scrollY;

  if (y > 200) {
    $('cw-section').style.display = 'block';
  }
});

/* ───────── INIT ───────── */
function init() {
  cwLoad();
  renderCW();
  renderHot();
}

init();
</script>
