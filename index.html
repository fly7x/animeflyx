<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeFlyX</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b0b10;
color:#fff;
scroll-behavior:smooth;
}

section{padding:60px 20px}
.center{text-align:center}

/* LANDING */
#landing{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:20px;
}

input{
width:80%;
max-width:500px;
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

/* HOT */
.hot-wrap{
margin-top:10px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
}

.hot{
background:#1b1b22;
padding:6px 12px;
border-radius:8px;
cursor:pointer;
}

/* ROWS */
.row{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px 0;
}

.card{
min-width:140px;
background:#16161d;
border-radius:10px;
overflow:hidden;
cursor:pointer;
flex-shrink:0;
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card div{
padding:8px;
font-size:13px;
}

/* SECTIONS */
.hidden{display:none}

.section-title{
font-size:22px;
margin-bottom:10px;
}

/* WATCH */
#watch{
display:flex;
gap:20px;
flex-wrap:wrap;
}

#player{
width:70%;
height:420px;
border:none;
}

#episodes{
width:25%;
max-height:420px;
overflow:auto;
}

.ep{
padding:10px;
background:#1b1b22;
margin-bottom:5px;
cursor:pointer;
}

/* CONTINUE WATCHING */
.dim{opacity:0.6;font-size:13px}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
<h1>AnimeFlyX</h1>

<input id="search" placeholder="Search anime...">

<div class="hot-wrap" id="hot"></div>
</div>

<!-- CONTINUE WATCHING -->
<section id="cwSec">
<h2 class="section-title">Continue Watching</h2>
<div class="row" id="cw"></div>
</section>

<!-- WHY -->
<section>
<h2 class="section-title">Why Choose Us</h2>
<p>Free anime streaming. No ads. Fast loading. Simple UI.</p>
</section>

<!-- DISCORD -->
<section>
<h2 class="section-title">Discord</h2>
<a href="https://discord.gg/aFjbJ6HSN6" target="_blank">Join Server</a>
</section>

<!-- BROWSE -->
<section id="browse" class="hidden">
<h2 class="section-title">Results</h2>
<div class="row" id="grid"></div>
</section>

<!-- WATCH -->
<section id="watch" class="hidden">
<h2 id="title"></h2>

<div id="watch">
<iframe id="player"></iframe>

<div id="episodes"></div>
</div>
</section>

<script>
const $ = id => document.getElementById(id);

let STATE = {anime:null,ep:1};

const HOT = ["One Piece","Naruto","Jujutsu Kaisen","Bleach"];

function renderHot(){
$('hot').innerHTML = HOT.map(q =>
`<div class="hot" onclick="search('${q}')">${q}</div>`
).join('');
}

/* JIKAN */
async function fetchAnime(q){
const r = await fetch(`https://api.jikan.moe/v4/anime?q=${q}&limit=20`);
const j = await r.json();
return j.data;
}

/* SEARCH */
async function search(q){
const data = await fetchAnime(q);

$('browse').classList.remove('hidden');

$('grid').innerHTML = data.map(a=>`
<div class="card" onclick='openAnime(${a.mal_id},"${a.title}",${a.episodes||12})'>
<img src="${a.images.jpg.image_url}">
<div>${a.title}</div>
</div>
`).join('');
}

/* PLAYER */
function openAnime(id,title,eps){
STATE = {anime:{id,title,eps},ep:1};

$('title').textContent = title;
$('player').src = `https://vidlink.pro/anime/${id}/1/sub`;

buildEpisodes(eps);

show('watch');
saveCW(id,title,1);
}

function buildEpisodes(n){
const el = $('episodes');
el.innerHTML='';
for(let i=1;i<=n;i++){
const d=document.createElement('div');
d.className='ep';
d.textContent='Episode '+i;
d.onclick=()=>{
STATE.ep=i;
$('player').src=`https://vidlink.pro/anime/${STATE.anime.id}/${i}/sub`;
saveCW(STATE.anime.id,STATE.anime.title,i);
};
el.appendChild(d);
}
}

/* CONTINUE WATCHING */
const KEY='cw';

function saveCW(id,title,ep){
let cw=JSON.parse(localStorage.getItem(KEY)||"[]");
cw=cw.filter(x=>x.id!==id);
cw.unshift({id,title,ep});
localStorage.setItem(KEY,JSON.stringify(cw));
renderCW();
}

function renderCW(){
let cw=JSON.parse(localStorage.getItem(KEY)||"[]");

$('cw').innerHTML = cw.length
? cw.map(a=>`
<div class="card" onclick="openAnime(${a.id},'${a.title}',12)">
<div>${a.title}</div>
<small>Ep ${a.ep}</small>
</div>
`).join('')
: `<p class="dim">Start watching to see progress here</p>`;
}

/* VIEW */
function show(id){
$(id).classList.remove('hidden');
}

/* SCROLL reveal */
window.addEventListener('scroll',()=>{
if(window.scrollY>200){
$('cwSec').style.display='block';
}
});

/* INIT */
renderHot();
renderCW();

/* ENTER SEARCH */
$('search').addEventListener('keydown',e=>{
if(e.key==='Enter') search(e.target.value);
});
</script>

</body>
</html>
